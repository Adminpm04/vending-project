<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vending QR · Админка</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{margin:0;font-family:'Manrope',system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--text);transition:background .35s,color .35s}
  input,select,button{font-family:inherit}
  [data-theme="light"]{--bg:#F5F5F5;--surf:#FFFFFF;--text:#111111;--text2:#6B6B6B;--line:#E6E6E6;--accent:#8B253B;--accent2:#8B253B;--accsoft:rgba(139,37,59,.08);--glass:rgba(245,245,245,.7);--card-sh:0 2px 5px rgba(17,17,17,.04),0 12px 30px rgba(17,17,17,.08);--card-sh-h:0 6px 14px rgba(17,17,17,.07),0 22px 44px rgba(17,17,17,.14);--btn-sh:0 8px 22px rgba(139,37,59,.35),inset 0 1px 0 rgba(255,255,255,.22);--ped:linear-gradient(150deg,#FFFFFF,#EDEDED);--zebra:rgba(17,17,17,.028)}
  [data-theme="dark"]{--bg:#111111;--surf:#1B1B1B;--text:#F5F5F5;--text2:#9A9A9A;--line:#2A2A2A;--accent:#8B253B;--accent2:#C24A63;--accsoft:rgba(194,74,99,.12);--glass:rgba(17,17,17,.7);--card-sh:0 2px 5px rgba(0,0,0,.4),0 12px 30px rgba(0,0,0,.45);--card-sh-h:0 6px 14px rgba(0,0,0,.5),0 22px 44px rgba(0,0,0,.55);--btn-sh:0 8px 24px rgba(139,37,59,.5),inset 0 1px 0 rgba(255,255,255,.14);--ped:linear-gradient(150deg,#242424,#181818);--zebra:rgba(245,245,245,.03)}
  @keyframes glowdot{0%,100%{box-shadow:0 0 0 0 rgba(46,158,91,.55)}70%{box-shadow:0 0 0 7px rgba(46,158,91,0)}}
  @keyframes glowdotred{0%,100%{box-shadow:0 0 0 0 rgba(209,67,67,.55)}70%{box-shadow:0 0 0 7px rgba(209,67,67,0)}}
  @keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
  @keyframes fadeup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes toastin{from{opacity:0;transform:translate(-50%,14px)}to{opacity:1;transform:translate(-50%,0)}}
  .hidden{display:none!important}
  .brand-ic{border-radius:12px;background:linear-gradient(145deg,#A03050,#8B253B);box-shadow:0 8px 18px rgba(139,37,59,.4);display:grid;place-items:center;color:#fff;font-weight:800}
  .btn-accent{font-weight:800;color:#fff;background:linear-gradient(160deg,#A03050,#8B253B);border:none;border-radius:13px;cursor:pointer;box-shadow:var(--btn-sh);transition:transform .15s}
  .btn-accent:active{transform:scale(.96)}
  .fld{font-size:14px;font-weight:700;color:var(--text);background:var(--bg);border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;outline:none;transition:border-color .2s,box-shadow .2s}
  .fld:focus{border-color:var(--accent2);box-shadow:0 0 0 4px var(--accsoft)}
  .cardbox{background:var(--surf);border:1px solid var(--line);border-radius:20px;box-shadow:var(--card-sh)}

  /* Layout */
  #login{position:fixed;inset:0;z-index:40;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px}
  #shell{display:flex;height:100vh;min-height:0}
  #side{flex:none;width:248px;display:flex;flex-direction:column;background:var(--surf);border-right:1px solid var(--line)}
  #main{flex:1;display:flex;flex-direction:column;min-width:0}
  #topbar{flex:none;display:flex;align-items:center;gap:12px;padding:16px 26px;background:var(--surf);border-bottom:1px solid var(--line)}
  #content{flex:1;overflow:auto;padding:26px;min-height:0}
  #bottomnav{display:none}
  .nav-btn{display:flex;align-items:center;gap:11px;text-align:left;font-size:14px;font-weight:700;border:none;border-radius:13px;padding:12px 13px;cursor:pointer;transition:all .15s;width:100%;background:transparent;color:var(--text2)}
  .nav-btn.active{background:linear-gradient(160deg,#A03050,#8B253B);color:#fff;box-shadow:0 8px 20px rgba(139,37,59,.35)}
  .h1{font-size:26px;font-weight:800;line-height:1.15}
  .sub{font-size:12.5px;font-weight:600;color:var(--text2)}
  .toggle{font-weight:600;font-size:12.5px;color:var(--text);background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:8px 14px;cursor:pointer;white-space:nowrap}
  .avatar{border-radius:50%;background:linear-gradient(145deg,#A03050,#8B253B);color:#fff;display:grid;place-items:center;font-weight:800;box-shadow:0 6px 14px rgba(139,37,59,.35)}

  .cards4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .metric{background:var(--surf);border:1px solid var(--line);border-radius:20px;padding:18px 20px;box-shadow:var(--card-sh);transition:transform .18s,box-shadow .25s}
  .metric:hover{transform:translateY(-3px);box-shadow:var(--card-sh-h)}
  .metric .top{display:flex;justify-content:space-between;align-items:center}
  .metric .lbl{font-size:13px;font-weight:700;color:var(--text2)}
  .metric .ic{width:34px;height:34px;border-radius:11px;background:var(--accsoft);color:var(--accent2);display:grid;place-items:center;font-weight:800;font-size:13px}
  .metric .val{font-size:30px;font-weight:800;letter-spacing:-.5px;margin-top:10px}
  .grid-dash{display:grid;grid-template-columns:1.55fr 1fr;gap:18px;align-items:start}
  .cards-pts{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .cards-prod{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .pt-card{background:var(--surf);border:1px solid var(--line);border-radius:20px;padding:18px 20px;box-shadow:var(--card-sh);cursor:pointer;transition:transform .18s,box-shadow .25s}
  .pt-card:hover{transform:translateY(-3px);box-shadow:var(--card-sh-h)}
  .mini{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:9px 12px}
  .mini .k{font-size:11px;font-weight:700;color:var(--text2)}
  .tbl-wrap{background:var(--surf);border:1px solid var(--line);border-radius:20px;box-shadow:var(--card-sh);overflow:hidden}
  .seg{display:flex;gap:4px;background:var(--surf);border:1px solid var(--line);border-radius:12px;padding:4px}
  .seg button{font-size:12.5px;font-weight:800;border:none;border-radius:9px;padding:8px 14px;cursor:pointer;transition:all .15s;background:transparent;color:var(--text2)}
  .seg button.active{background:linear-gradient(160deg,#A03050,#8B253B);color:#fff;box-shadow:0 4px 12px rgba(139,37,59,.35)}
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:80;background:rgba(17,17,17,.92);color:#F5F5F5;font-size:13.5px;font-weight:700;border-radius:999px;padding:12px 22px;box-shadow:0 16px 40px rgba(0,0,0,.35);backdrop-filter:blur(8px);animation:toastin .25s ease;white-space:nowrap}
  /* Модалка вместо системных prompt()/alert() — под общий дизайн */
  #modal-overlay{position:fixed;inset:0;z-index:90;background:rgba(17,17,17,.55);display:flex;align-items:center;justify-content:center;padding:20px;animation:toastin .18s ease}
  .modal-box{background:var(--surf);border-radius:22px;box-shadow:var(--card-sh-h);padding:26px;max-width:460px;width:100%;max-height:88vh;overflow:auto}
  .modal-box h3{font-size:18px;font-weight:800;margin:0 0 4px}
  .modal-box .sub{margin-bottom:16px}
  /* Карта города (Leaflet + CARTO — чистый стиль в духе Google Maps) */
  #leaflet-map{height:min(600px,72vh);border-radius:22px;border:1px solid var(--line);box-shadow:var(--card-sh);z-index:0;background:var(--surf)}
  .vq-dot{width:18px;height:18px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.45)}
  .leaflet-tooltip.vq-tip{background:var(--surf);color:var(--text);border:1px solid var(--line);border-radius:999px;
    padding:3px 11px;font-family:'Manrope',sans-serif;font-weight:800;font-size:12px;box-shadow:0 2px 10px rgba(0,0,0,.18);white-space:nowrap}
  .leaflet-tooltip.vq-tip::before{display:none}
  [data-theme="dark"] .leaflet-tooltip.vq-tip{background:#1B1B1B;color:#F5F5F5;border-color:#2A2A2A}
  .leaflet-popup-content-wrapper{border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.18)}
  .leaflet-popup-content{margin:13px 15px;font-family:'Manrope',sans-serif}
  .leaflet-container{font-family:'Manrope',sans-serif}
  .leaflet-bar a{border-radius:8px!important}
  .leaflet-control-zoom{border:none!important;box-shadow:0 2px 10px rgba(0,0,0,.15)}
  .map-panel{background:var(--surf);border:1px solid var(--line);border-radius:16px;box-shadow:var(--card-sh);padding:12px 14px}
  [data-theme="dark"] .leaflet-popup-content-wrapper,[data-theme="dark"] .leaflet-popup-tip{background:#1B1B1B;color:var(--text)}
  [data-theme="dark"] .leaflet-bar a{background:#1B1B1B;color:#F5F5F5;border-color:#2A2A2A}

  @media(max-width:900px){
    #side{display:none}
    #topbar{padding:14px 16px}
    #content{padding:16px 16px 84px}
    #bottomnav{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:30;border-top:1px solid var(--line);background:var(--surf);padding:8px 6px 10px}
    .bn-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:transparent;border-radius:12px;padding:7px 2px;cursor:pointer;color:var(--text2)}
    .bn-btn.active{color:var(--accent2)}
    .cards4{grid-template-columns:repeat(2,1fr)}
    .grid-dash{grid-template-columns:1fr}
    .cards-pts{grid-template-columns:1fr}
    .cards-prod{grid-template-columns:repeat(2,1fr)}
    .h1{font-size:21px}
  }
</style>
</head>
<body>

<!-- A0 Вход -->
<div id="login">
  <button class="toggle" id="login-theme" onclick="toggleTheme()" style="position:absolute;top:18px;right:18px;background:var(--surf);box-shadow:var(--card-sh)">◐ Тема</button>
  <div class="cardbox" style="width:440px;max-width:100%;border-radius:24px;box-shadow:var(--card-sh-h);padding:40px 36px;display:flex;flex-direction:column;align-items:center;gap:8px;animation:fadeup .4s ease">
    <div class="brand-ic" style="width:64px;height:64px;border-radius:18px;font-size:24px">VQ</div>
    <div style="font-size:26px;font-weight:800;margin-top:10px">Vending QR</div>
    <div class="sub">Панель управления сетью автоматов</div>
    <div style="width:100%;margin-top:22px;display:flex;flex-direction:column;gap:8px">
      <label style="font-size:13px;font-weight:700;color:var(--text2)">Логин</label>
      <input id="login-username" type="text" autocomplete="username" class="fld" placeholder="admin" style="font-size:16px;padding:15px 16px;border-radius:14px" onkeydown="if(event.key==='Enter')document.getElementById('login-password').focus()">
    </div>
    <div style="width:100%;margin-top:10px;display:flex;flex-direction:column;gap:8px">
      <label style="font-size:13px;font-weight:700;color:var(--text2)">Пароль</label>
      <input id="login-password" type="password" autocomplete="current-password" class="fld" placeholder="••••••••••••" style="font-size:16px;padding:15px 16px;border-radius:14px" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn-accent" style="width:100%;margin-top:14px;font-size:16px;padding:16px;border-radius:14px" onclick="login()">Войти</button>
    <div id="login-err" style="font-size:12.5px;color:#D14343;font-weight:700;margin-top:10px;min-height:16px"></div>
  </div>
</div>

<!-- Приложение -->
<div id="shell" class="hidden">
  <div id="side">
    <div style="display:flex;align-items:center;gap:11px;padding:22px 20px 18px">
      <div class="brand-ic" style="width:40px;height:40px;font-size:16px">VQ</div>
      <div><div style="font-size:16px;font-weight:800;line-height:1.1">Vending QR</div><div class="sub">сеть автоматов</div></div>
    </div>
    <div id="nav" style="display:flex;flex-direction:column;gap:4px;padding:8px 12px;flex:1"></div>
    <div style="padding:14px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px">
      <div style="width:38px;height:38px;border-radius:50%;background:var(--accsoft);color:var(--accent2);display:grid;place-items:center;font-weight:800;font-size:13px" id="side-avatar">VQ</div>
      <div style="flex:1;min-width:0"><div style="font-size:13.5px;font-weight:700" id="side-username">—</div><div class="sub" id="side-role">—</div></div>
      <button onclick="logout()" title="Выйти" style="border:none;background:transparent;color:var(--text2);font-size:16px;cursor:pointer">⏻</button>
    </div>
  </div>

  <div id="main">
    <div id="topbar">
      <div style="min-width:0"><div class="h1" id="tab-title">Дашборд</div><div class="sub" id="tab-sub"></div></div>
      <div style="flex:1"></div>
      <button class="toggle" onclick="toggleTheme()">◐ Тема</button>
      <div class="avatar" style="width:36px;height:36px;font-size:12.5px" id="top-avatar">VQ</div>
    </div>
    <div id="content"></div>
    <div id="bottomnav"></div>
  </div>
</div>

<script>
// ── Тема ──
function prefersDark(){ return !!(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches); }
function initTheme(){
  const t = localStorage.getItem('vq_theme') || (prefersDark() ? 'dark':'light');
  document.documentElement.setAttribute('data-theme', t);
}
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme');
  const t = cur === 'dark' ? 'light':'dark';
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('vq_theme', t);
  if(typeof applyTiles==='function' && leafletMap) applyTiles(); // сменить плитки карты под тему
}
initTheme();

// ── Состояние ──
var TOKEN = localStorage.getItem('vq_session_token') || '';
var ME = null; // {username, role}
var S = { tab:'dash', pointId:null, machines:[], stats:null, sessions:[], slots:[], users:[],
            fpt:'all', fst:'all', fday:'all', fq:'', blist:[] };

const ROLE_LABEL = { admin:'Администратор', operator:'Оператор', viewer:'Наблюдатель' };
const NAV_ALL = [['dash','Дашборд','▦'],['pts','Точки','◉'],['sess','Сессии','≣'],['prod','Товары','▤'],['stat','Статистика','∿'],['set','Настройки','⚙']];
function navFor(role){ return role==='admin' ? NAV_ALL : NAV_ALL.filter(([id])=>id!=='set'); }
function bnFor(role){
  const base = [['dash','Дашборд','▦'],['pts','Точки','◉'],['sess','Сессии','≣'],['prod','Товары','▤']];
  return role==='admin' ? base.concat([['set','Ещё','⋯']]) : base.concat([['stat','Ещё','∿']]);
}
const TAB_META = {
  dash:['Дашборд','Обзор сети за сегодня'], pts:['Точки','Автоматы вашей сети'],
  point:['Точка','Слоты и товары автомата'], sess:['Сессии','История покупок и возвратов'],
  prod:['Товары','Общий каталог сети'], stat:['Статистика','Аналитика продаж'],
  set:['Настройки','Внешний вид, уведомления, доступы, пользователи']
};
const STMAP = {
  pending:['Ожидание','#E0A400'], paid:['Оплачено','#2E9E5B'], dispensing:['Выдаётся','#E0A400'],
  dispensed:['Выдано','#2E9E5B'], refund_pending:['Возврат','#D14343'], refunded:['Возвращено','#9A9A9A'],
  expired:['Истекло','#9A9A9A'], failed:['Ошибка','#D14343']
};
function canEdit(){ return ME && (ME.role==='admin' || ME.role==='operator'); }
function isAdmin(){ return ME && ME.role==='admin'; }

// ── Утилиты ──
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmt(v){ return String(Math.round(v||0)).replace(/\B(?=(\d{3})+(?!\d))/g,' ') + ' сомони'; }
// Тонкие line-иконки вместо эмодзи (эмодзи рисуется по-разному на разных
// устройствах/шрифтах и выбивается из общего минималистичного стиля).
// stroke="currentColor" — цвет наследуется от text/color кнопки-обёртки.
function iconSvg(path, size){
  return `<svg width="${size||16}" height="${size||16}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block">${path}</svg>`;
}
const ICON_EDIT = (size)=>iconSvg('<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5Z"/>', size);
const ICON_TRASH = (size)=>iconSvg('<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>', size);
const ICON_KEY = (size)=>iconSvg('<circle cx="7.5" cy="15.5" r="5.5"/><path d="M21 2l-9.6 9.6"/><path d="M15.5 7.5l3 3L22 7l-3-3"/>', size);
function chip(status){
  const [t,c] = STMAP[status] || [status,'#9A9A9A'];
  return `<span style="display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:800;color:${c};background:${c}1f;border-radius:999px;padding:6px 11px;white-space:nowrap;border:1px solid ${c}55">${t}</span>`;
}
function timeOf(iso){ if(!iso) return '—'; const d=new Date(iso+ (iso.endsWith('Z')?'':'Z')); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function dateKey(iso){ const d=new Date(iso+(iso.endsWith('Z')?'':'Z')); return d.toISOString().slice(0,10); }
let toastT;
function toast(msg){ let e=document.getElementById('toast'); if(e) e.remove();
  e=document.createElement('div'); e.id='toast'; e.textContent=msg; document.body.appendChild(e);
  clearTimeout(toastT); toastT=setTimeout(()=>e.remove(),2600); }

// ── Модалка (вместо system prompt()/alert(), под общий дизайн) ──
function showModal(html){
  closeModal();
  const ov=document.createElement('div'); ov.id='modal-overlay';
  ov.innerHTML=`<div class="modal-box" onclick="event.stopPropagation()">${html}</div>`;
  ov.onclick=closeModal;
  document.body.appendChild(ov);
  const first=ov.querySelector('input,textarea'); if(first) setTimeout(()=>first.focus(),50);
}
function closeModal(){ const ov=document.getElementById('modal-overlay'); if(ov) ov.remove(); if(modalMap){ modalMap.remove(); modalMap=null; } }

async function api(path, opts={}){
  const r = await fetch(path, {...opts, headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN, ...(opts.headers||{})}});
  if(r.status===401){ doLogout(); throw new Error('unauthorized'); }
  if(!r.ok){ let msg='http '+r.status; try{ const j=await r.json(); if(j.detail) msg=j.detail; }catch(e){} throw new Error(msg); }
  const ct=r.headers.get('content-type')||''; return ct.includes('json')? r.json(): r.text();
}

// ── Аутентификация ──
async function login(){
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if(!username || !password){ return; }
  try{
    const r = await fetch('/api/admin/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username,password})});
    if(!r.ok) throw new Error();
    const data = await r.json();
    TOKEN = data.token; ME = {username:data.username, role:data.role};
    localStorage.setItem('vq_session_token', TOKEN);
    enterShell();
  }catch(e){
    document.getElementById('login-err').textContent = 'Неверный логин или пароль';
  }
}
async function logout(){
  try{ await api('/api/admin/logout', {method:'POST'}); }catch(e){}
  doLogout();
}
function doLogout(){
  TOKEN=''; ME=null; localStorage.removeItem('vq_session_token');
  document.getElementById('shell').classList.add('hidden');
  document.getElementById('login').classList.remove('hidden');
  document.getElementById('login-err').textContent='';
}
function enterShell(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('shell').classList.remove('hidden');
  const initials = ME.username.slice(0,2).toUpperCase();
  document.getElementById('side-avatar').textContent = initials;
  document.getElementById('top-avatar').textContent = initials;
  document.getElementById('side-username').textContent = ME.username;
  document.getElementById('side-role').textContent = ROLE_LABEL[ME.role] || ME.role;
  buildNav(); go('dash');
}

// ── Навигация ──
function buildNav(){
  document.getElementById('nav').innerHTML = navFor(ME.role).map(([id,label,icon])=>
    `<button class="nav-btn" data-nav="${id}" onclick="go('${id}')"><span style="width:22px;text-align:center;font-size:15px">${icon}</span><span>${label}</span></button>`).join('');
  document.getElementById('bottomnav').innerHTML = bnFor(ME.role).map(([id,label,icon])=>
    `<button class="bn-btn" data-bn="${id}" onclick="go('${id}')"><span style="font-size:17px;line-height:1">${icon}</span><span style="font-size:10px;font-weight:800">${label}</span></button>`).join('');
}
function markNav(){
  const active = S.tab==='point'?'pts':S.tab;
  document.querySelectorAll('[data-nav]').forEach(b=>b.classList.toggle('active', b.dataset.nav===active));
  const bnActive = (ME.role!=='admin' && S.tab==='stat') ? 'stat' : (S.tab==='stat'||S.tab==='set')?'set':active;
  document.querySelectorAll('[data-bn]').forEach(b=>b.classList.toggle('active', b.dataset.bn===bnActive));
}
function go(tab){
  if(tab==='set' && !isAdmin()) tab='dash'; // защита от прямого вызова go('set') не-админом
  S.tab = tab;
  const [t,s] = TAB_META[tab]||['',''];
  document.getElementById('tab-title').textContent = t;
  document.getElementById('tab-sub').textContent = s;
  markNav();
  render();
  // Свежие данные подтягиваем при переходе на вкладку, а не фоновым таймером
  // каждые 15 сек — тот дёргал экран/карту в произвольный момент, даже пока
  // ничего не открывали. Перерисовываем, только если всё ещё на этой вкладке
  // (не успели уйти дальше, пока грузилось).
  refreshCore().then(()=>{ if(S.tab===tab) render(); });
}

// ── Загрузка данных ──
async function refreshCore(){
  try{
    const [stats, machines, sessions] = await Promise.all([
      api('/api/admin/stats'), api('/api/admin/machines'), api('/api/admin/sessions')
    ]);
    S.stats=stats; S.machines=machines; S.sessions=sessions;
  }catch(e){}
}

function statOf(mid){ return (S.stats?.by_machine||[]).find(m=>m.machine_id===mid) || {sales:0,revenue:0}; }

// ── Рендер ──
function render(){
  const c = document.getElementById('content');
  const mapOpen = S.tab==='pts' && ptsView==='map';
  // Карта уже смонтирована и мы всё ещё на ней (напр. авто-рефреш раз в 15с) —
  // не пересобираем DOM (это уничтожило бы Leaflet и сбросило зум/позицию),
  // а только обновляем маркеры.
  if(mapOpen && leafletMap && document.getElementById('leaflet-map')){
    syncMarkers();
    return;
  }
  if(leafletMap){ leafletMap.remove(); leafletMap=null; markerLayer=null; } // уходим с карты — чистим
  if(S.tab==='dash') c.innerHTML = viewDash();
  else if(S.tab==='pts') c.innerHTML = viewPts();
  else if(S.tab==='point') viewPoint(c);
  else if(S.tab==='sess') c.innerHTML = viewSess();
  else if(S.tab==='prod') viewProd(c);
  else if(S.tab==='stat') c.innerHTML = viewStat();
  else if(S.tab==='set') viewSet(c);
  if(mapOpen) setTimeout(mountMap, 0);
}

function loadingBlock(){

// A1 Дашборд
function viewDash(){
  if(!S.stats) return loadingBlock();
  const totalSales = (S.stats.by_machine||[]).reduce((a,m)=>a+m.sales,0);
  const online = S.stats.machines_online, total = S.machines.length;
  // График выручки 14 дней — из S.stats.daily_revenue (посчитан на сервере по
  // ВСЕЙ таблице сессий, не из S.sessions: тот список отдаёт максимум 200
  // последних записей, и при активных продажах старые дни оттуда просто
  // вымываются — график тогда красиво врёт, показывая пусто на дни, где
  // на деле были продажи.
  const days=(S.stats.daily_revenue||[]).map(d=>({key:d.date, label:String(new Date(d.date+'T00:00:00Z').getUTCDate()), rev:d.revenue}));
  const maxRev = Math.max(1,...days.map(d=>d.rev));
  const bars = days.map(d=>{
    const h=Math.max(4, Math.round(d.rev/maxRev*180));
    return `<div title="${d.label}: ${fmt(d.rev)}" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;min-width:0">
      <div style="width:100%;max-width:26px;height:${h}px;border-radius:7px 7px 3px 3px;background:linear-gradient(180deg,#A03050,#8B253B);transition:filter .15s"></div>
      <span style="font-size:10.5px;font-weight:600;color:var(--text2)">${d.label}</span></div>`;
  }).join('');
  const total14 = days.reduce((a,d)=>a+d.rev,0);
  const recent = S.sessions.slice(0,7).map(r=>{
    const m=S.machines.find(x=>x.machine_id===r.machine_id);
    return `<div style="display:flex;align-items:center;gap:11px;padding:11px 8px;border-radius:12px">
      <span style="font-size:12px;font-weight:700;color:var(--text2);font-variant-numeric:tabular-nums;flex:none">${timeOf(r.created_at)}</span>
      <div style="flex:1;min-width:0"><div style="font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(r.product_name||'—')}</div>
        <div class="sub">${esc(m?m.name||m.machine_id:r.machine_id)}</div></div>
      <span style="font-size:14px;font-weight:800;color:var(--accent2);flex:none">${fmt(r.amount)}</span>${chip(r.status)}</div>`;
  }).join('') || `<div class="sub" style="padding:14px">Пока нет продаж</div>`;

  return `<div style="display:flex;flex-direction:column;gap:18px;animation:fadeup .35s ease">
    <div class="cards4">
      ${metric('Выручка сегодня', fmt(S.stats.total_revenue), 'c.', 'accsoft')}
      ${metric('Продаж сегодня', totalSales, '▮', 'accsoft')}
      ${metric('Точек онлайн', `${online} <span style="font-size:18px;color:var(--text2);font-weight:700">/ ${total}</span>`, '●', 'green')}
      ${metric('Возвратов сегодня', S.stats.refunds_today, '↺', 'red')}
    </div>
    <div class="grid-dash">
      <div class="cardbox" style="border-radius:22px;padding:22px">
        <div style="display:flex;align-items:baseline;gap:10px"><span style="font-size:16px;font-weight:800">Выручка за 14 дней</span><span style="flex:1"></span><span class="sub">всего ${fmt(total14)}</span></div>
        <div style="display:flex;align-items:flex-end;gap:6px;height:210px;margin-top:20px">${bars}</div>
      </div>
      <div class="cardbox" style="border-radius:22px;padding:22px">
        <div style="display:flex;align-items:center"><span style="font-size:16px;font-weight:800">Последние продажи</span><span style="flex:1"></span><button onclick="go('sess')" style="border:none;background:transparent;color:var(--accent2);font-weight:700;font-size:13px;cursor:pointer">Все →</button></div>
        <div style="display:flex;flex-direction:column;margin-top:10px">${recent}</div>
      </div>
    </div>
  </div>`;
}
function metric(lbl,val,icon,kind){
  const ic = kind==='green'?`<span class="ic" style="background:rgba(46,158,91,.12)"><i style="width:11px;height:11px;border-radius:50%;background:#2E9E5B;display:block;animation:glowdot 2s infinite"></i></span>`
    : kind==='red'?`<span class="ic" style="background:rgba(209,67,67,.12);color:#D14343">${icon}</span>`
    : `<span class="ic">${icon}</span>`;
  return `<div class="metric"><div class="top"><span class="lbl">${lbl}</span>${ic}</div><div class="val">${val}</div></div>`;
}

// A2 Точки

      </div></div>`;

    <div class="map-panel" style="margin-top:12px">

      <div class="sub" style="margin-bottom:10px">${canEdit()?'Нажмите «разместить», затем кликните нужное место на карте':'Точки без координат пока не показаны на карте'}</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${unplaced.map(m=>`<span style="display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:6px 8px 6px 12px">
          ${esc(m.name||m.machine_id)}
          ${canEdit()?`<button onclick="startPlacing('${esc(m.machine_id)}')" style="font-size:11.5px;font-weight:800;color:#fff;background:linear-gradient(160deg,#A03050,#8B253B);border:none;border-radius:999px;padding:5px 11px;cursor:pointer">разместить</button>`:''}

      <span style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700"><i style="width:9px;height:9px;border-radius:50%;background:#D14343;display:block"></i>Офлайн · ${offCount}</span>

  return `<div style="display:flex;flex-direction:column;gap:16px;animation:fadeup .35s ease">

      <div style="flex:1"></div>
      ${canEdit() ? `<button class="btn-accent" style="padding:12px 20px" onclick="addPoint()">+ Добавить точку</button>` : ''}

function topAddPoint(){ return `<div style="display:flex;justify-content:flex-end;margin-bottom:16px"><button class="btn-accent" style="padding:12px 20px" onclick="addPoint()">+ Добавить точку</button></div>`; }

// ── Карта города (Leaflet + CARTO, стиль в духе Google Maps) ──
let leafletMap=null, markerLayer=null, tileLayer=null, placingMachineId=null;
const DUSHANBE=[38.5598,68.7870];
const TILES={
  light:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
  dark:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
};
function applyTiles(){
  if(!leafletMap) return;
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  if(tileLayer) leafletMap.removeLayer(tileLayer);
  tileLayer=L.tileLayer(dark?TILES.dark:TILES.light,{
    maxZoom:20, subdomains:'abcd', detectRetina:true,
    attribution:'© OpenStreetMap © CARTO'}).addTo(leafletMap);
  tileLayer.bringToBack();
}
function mountMap(){
  const el=document.getElementById('leaflet-map');
  if(!el || typeof L==='undefined') return;
  leafletMap = L.map(el,{zoomControl:true,attributionControl:true,scrollWheelZoom:true}).setView(DUSHANBE,13);
  applyTiles();
  markerLayer = L.layerGroup().addTo(leafletMap);
  leafletMap.on('click', onMapClick);
  syncMarkers();
  const placed=S.machines.filter(m=>m.lat!=null&&m.lng!=null);
  if(placed.length){
    const b=L.latLngBounds(placed.map(m=>[m.lat,m.lng]));
    leafletMap.fitBounds(b.pad(0.35),{maxZoom:16});
  }
  setTimeout(()=>leafletMap && leafletMap.invalidateSize(), 60); // корректный размер после вставки в DOM
}
function pinIcon(color){
  return L.divIcon({className:'', html:`<div class="vq-dot" style="background:${color}"></div>`,
    iconSize:[18,18], iconAnchor:[9,9], popupAnchor:[0,-10]});
}
function syncMarkers(){
  if(!markerLayer) return;
  markerLayer.clearLayers();
  for(const m of S.machines){
    if(m.lat==null||m.lng==null) continue;
    const st=statOf(m.machine_id); const color=m.online?'#2E9E5B':'#D14343';
    const mk=L.marker([m.lat,m.lng],{icon:pinIcon(color), draggable:canEdit()}).addTo(markerLayer);
    // Постоянная подпись над кружком — сразу видно, где какая точка, без клика.
    mk.bindTooltip(esc(m.name||m.machine_id), {permanent:true, direction:'top', offset:[0,-8], className:'vq-tip', opacity:1});
    mk.bindPopup(`<div style="min-width:150px">
      <div style="font-weight:800;font-size:14px;margin-bottom:2px">${esc(m.name||m.machine_id)}</div>
      <div style="color:#888;font-size:12px;margin-bottom:6px">${esc(m.location||'')}</div>
      <div style="font-size:12px;margin-bottom:2px"><b style="color:${color}">${m.online?'Онлайн':'Офлайн'}</b> · выручка ${fmt(st.revenue)} · ${st.sales} прод.</div>
      <button onclick="openPoint('${esc(m.machine_id)}')" style="margin-top:6px;font-size:12px;font-weight:800;color:#fff;background:linear-gradient(160deg,#A03050,#8B253B);border:none;border-radius:9px;padding:7px 14px;cursor:pointer">Открыть →</button>
    </div>`);
    if(canEdit()){
      mk.on('dragend', e=>{ const p=e.target.getLatLng(); saveLocation(m.machine_id,p.lat,p.lng,true); });
    }
  }
}
function startPlacing(mid){
  placingMachineId=mid;
  const h=document.getElementById('place-hint');
  const m=S.machines.find(x=>x.machine_id===mid);
  if(h) h.textContent=`Кликните на карте, чтобы разместить «${(m&&m.name)||mid}»`;
  if(leafletMap) leafletMap.getContainer().style.cursor='crosshair';
}
function onMapClick(e){
  if(!placingMachineId || !canEdit()) return;
  saveLocation(placingMachineId, e.latlng.lat, e.latlng.lng, false);
  placingMachineId=null;
  if(leafletMap) leafletMap.getContainer().style.cursor='';
  const h=document.getElementById('place-hint'); if(h) h.textContent='';
}
async function saveLocation(mid, lat, lng, isDrag){
  try{
    await api(`/api/admin/machines/${encodeURIComponent(mid)}/location`,{method:'POST',body:JSON.stringify({lat,lng})});
    const m=S.machines.find(x=>x.machine_id===mid); if(m){ m.lat=lat; m.lng=lng; }
    toast('Координаты сохранены');
    if(!isDrag){ // новая точка размещена — перерисуем панель/маркеры
      const c=document.getElementById('content');
      // маркеры обновим, а панель «без координат» пересоберём мягко
      syncMarkers();
      // обновить панель снизу (список неразмещённых) без пересборки карты
      refreshUnplacedPanel();
    }
  }catch(e){ toast('Не удалось сохранить'); }
}
function refreshUnplacedPanel(){
  // Перерисовать только легенду и панель под картой, не трогая сам Leaflet.
  const wrap=document.getElementById('leaflet-map')?.parentElement;
  if(!wrap) return;
  // проще всего: если панель есть — перерисуем весь блок точек кроме карты через повторный вызов viewPts,
  // но чтобы не убить карту, обновим только внешние элементы вручную.
  const unplaced=S.machines.filter(m=>m.lat==null||m.lng==null);
  const hintPanel=wrap.querySelector('.map-panel');
  if(unplaced.length===0 && hintPanel){ hintPanel.remove(); }
}

function rebuildPts(){ if(leafletMap){ leafletMap.remove(); leafletMap=null; markerLayer=null; } render(); }

// ── Модалка «Добавить точку» — с мини-картой, чтобы место указывалось сразу
//    при создании и точка не «терялась» без координат до отдельного шага. ──
let modalMap=null, modalMapLatLng=null;
function addPoint(){
  modalMapLatLng=null;
  showModal(`<h3>Новая точка</h3>
    <div class="sub">Токен контроллера покажется один раз сразу после создания — сохраните его.</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <input id="np-id" class="fld" placeholder="ID автомата (например VND-003)">
      <input id="np-name" class="fld" placeholder="Название (например №3 · ТЦ «Пойтахт»)">
      <input id="np-location" class="fld" placeholder="Локация / адрес">
      <div id="np-map" style="height:220px;border-radius:14px;overflow:hidden;border:1px solid var(--line)"></div>
      <div class="sub" id="np-map-hint" style="margin:0">Кликните на карте, чтобы сразу отметить расположение (необязательно — можно и позже)</div>
      <div style="display:flex;gap:10px;margin-top:6px">
        <button class="btn-accent" style="flex:1;padding:13px" onclick="submitAddPoint()">Создать точку</button>
        <button onclick="closeModal()" style="padding:13px 20px;border-radius:11px;border:1.5px solid var(--line);background:var(--bg);color:var(--text);font-weight:700;cursor:pointer">Отмена</button>
      </div>
    </div>`);
  setTimeout(()=>{
    const el=document.getElementById('np-map');
    if(!el || typeof L==='undefined') return;
    modalMap=L.map(el,{zoomControl:true,attributionControl:false}).setView(DUSHANBE,12);
    const dark=document.documentElement.getAttribute('data-theme')==='dark';
    L.tileLayer(dark?TILES.dark:TILES.light,{maxZoom:20,subdomains:'abcd',detectRetina:true}).addTo(modalMap);
    let marker=null;
    modalMap.on('click', e=>{
      modalMapLatLng=e.latlng;
      if(marker) modalMap.removeLayer(marker);
      marker=L.marker(e.latlng,{icon:pinIcon('#8B253B')}).addTo(modalMap);
      const h=document.getElementById('np-map-hint'); if(h) h.textContent='Точка будет размещена здесь';
    });
    setTimeout(()=>modalMap && modalMap.invalidateSize(), 80);
  }, 60);
}
async function submitAddPoint(){
  const machine_id=document.getElementById('np-id').value.trim();
  const name=document.getElementById('np-name').value.trim();
  const location=document.getElementById('np-location').value.trim();
  if(!machine_id){ toast('Укажите ID автомата'); return; }
  let r;
  try{
    r = await api('/api/admin/machines',{method:'POST',body:JSON.stringify({machine_id,name,location})});
  }catch(e){
    if(e.message==='machine_id already exists') toast('Точка с таким ID уже есть');
    else if((e.message||'').startsWith('machine_id:')) toast('ID: только буквы, цифры, «-» и «_»');
    else toast('Не удалось создать точку');
    return;
  }
  if(modalMapLatLng){
    try{ await api(`/api/admin/machines/${encodeURIComponent(machine_id)}/location`,{method:'POST',body:JSON.stringify({lat:modalMapLatLng.lat,lng:modalMapLatLng.lng})}); }catch(e){}
  }
  await refreshCore(); rebuildPts();

function onSlotProductPick(){
  const sel=document.getElementById('ns-product');
  const custom=document.getElementById('ns-prod');
  const photoRow=document.getElementById('ns-photo-row');
  const price=document.getElementById('ns-price');
  const opt=sel.options[sel.selectedIndex];
  if(sel.value==='__custom'){
    custom.classList.remove('hidden'); custom.focus();
    photoRow.classList.remove('hidden');
  }else{
    custom.classList.add('hidden'); custom.value='';
    // Фото свободного товара имеет смысл только пока он не привязан к каталогу —
    // товар из каталога уже несёт своё фото.
    photoRow.classList.add('hidden'); nsImageUrl=null;
    document.getElementById('ns-preview').innerHTML='<span class="sub" style="font-size:9px">фото</span>';
    if(sel.value && opt.dataset.price && !price.value) price.value=opt.dataset.price;
  }
}
let nsImageUrl=null;
async function onSlotPhotoPick(input){
  const file=input.files&&input.files[0]; if(!file) return;
  if(file.size>4000000){ toast('Фото больше 4 МБ'); return; }
  const reader=new FileReader();
  reader.onload=async()=>{
    document.getElementById('ns-preview').innerHTML=`<img src="${reader.result}" style="width:100%;height:100%;object-fit:contain">`;
    try{
      const r=await api('/api/admin/upload',{method:'POST',body:JSON.stringify({filename:file.name,data_base64:reader.result})});
      nsImageUrl=r.url; toast('Фото загружено');
    }catch(e){ toast('Не удалось загрузить фото'); }
  };
  reader.readAsDataURL(file);
}
// Ручная выдача: клиент оплатил, но товар не выпал — оператор выдаёт его удалённо.
let _dispensing=false;
async function forceDispense(slot_id, name){
  if(_dispensing) return;
  if(!confirm(`Выдать «${name}» из слота ${slot_id} на этом автомате?\n\nАвтомат физически вытолкнет товар. Убедитесь, что клиент у автомата.`)) return;
  _dispensing=true;
  toast('Отправляем команду выдачи…');
  try{
    const r=await api(`/api/admin/machines/${encodeURIComponent(S.pointId)}/force-dispense`,{method:'POST',body:JSON.stringify({slot_id})});
    if(r.success){ toast('✓ Товар выдан'); await refreshCore(); render(); }
    else{ toast('Не удалось выдать: '+(r.message||'ошибка автомата')); }
  }catch(e){
    toast(e.message==='machine offline' ? 'Автомат сейчас офлайн' : 'Ошибка: '+(e.message||'не удалось'));
  }finally{ _dispensing=false; }
}
async function saveSlot(slot_id, field, value){
  const s = S.slots.find(x=>x.slot_id===slot_id); if(!s) return;
  const body = {slot_id, product_name:s.product_name, price:s.price, stock_qty:s.stock_qty, capacity:s.capacity};
  if(s.product_id) body.product_id=s.product_id;
  body[field] = field==='price'?parseFloat(value):parseInt(value,10);
  try{ await api(`/api/admin/machines/${encodeURIComponent(S.pointId)}/slots`,{method:'POST',body:JSON.stringify(body)});
    toast('Сохранено'); await refreshCore(); }catch(e){ toast('Ошибка сохранения'); }
}
// Изменить слот: подставляем текущие значения в форму «Добавить/изменить слот» —
// тот же upsert-эндпоинт по существующему № слота обновляет его, а не создаёт новый.
function editSlot(slot_id){
  const s = S.slots.find(x=>x.slot_id===slot_id); if(!s) return;
  document.getElementById('ns-id').value = s.slot_id;
  const sel = document.getElementById('ns-product');
  if(s.product_id){ sel.value = String(s.product_id); onSlotProductPick(); }
  else{
    sel.value = '__custom'; onSlotProductPick(); document.getElementById('ns-prod').value = s.product_name;
    if(s.image_url){
      nsImageUrl = s.image_url;
      document.getElementById('ns-preview').innerHTML = `<img src="${esc(s.image_url)}" style="width:100%;height:100%;object-fit:contain">`;
    }
  }
  document.getElementById('ns-price').value = s.price;
  document.getElementById('ns-cap').value = s.capacity;
  document.getElementById('ns-stock').value = s.stock_qty;
  document.getElementById('ns-id').scrollIntoView({behavior:'smooth', block:'center'});
  toast('Правки формы ниже — измените и нажмите «Сохранить»');
}
async function deleteSlot(slot_id, name){
  if(!confirm(`Удалить слот ${slot_id} («${name}») с этой точки?\n\nТовар и цена на этом слоте будут удалены — если он ещё продаётся на других точках, там ничего не изменится.`)) return;
  try{
    await api(`/api/admin/machines/${encodeURIComponent(S.pointId)}/slots/${slot_id}`,{method:'DELETE'});
    toast('Слот удалён'); await refreshCore(); render();
  }catch(e){ toast('Не удалось удалить слот'); }
}
async function addSlot(){
  const slot_id=parseInt(document.getElementById('ns-id').value,10);
  const sel=document.getElementById('ns-product');
  const price=parseFloat(document.getElementById('ns-price').value);
  const capacity=parseInt(document.getElementById('ns-cap').value,10)||10;
  const stock_qty=parseInt(document.getElementById('ns-stock').value,10)||0;
  if(!slot_id){ toast('Укажите № слота'); return; }
  const body={slot_id,price,capacity,stock_qty};
  if(sel.value && sel.value!=='__custom'){ body.product_id=parseInt(sel.value,10); }
  else{
    body.product_name=document.getElementById('ns-prod').value.trim();
    if(nsImageUrl) body.image_url=nsImageUrl;
  }
  if(!body.product_id && !body.product_name){ toast('Выберите товар или введите название'); return; }
  if(isNaN(price)){ toast('Укажите цену'); return; }
  try{ await api(`/api/admin/machines/${encodeURIComponent(S.pointId)}/slots`,{method:'POST',body:JSON.stringify(body)});
    toast('Слот сохранён'); render(); }catch(e){ toast('Ошибка'); }
}

function editProduct(id){

async function onPhotoPick(input){
  const file=input.files&&input.files[0]; if(!file) return;
  if(file.size>4000000){ toast('Фото больше 4 МБ'); return; }
  const reader=new FileReader();
  reader.onload=async()=>{
    document.getElementById('pf-preview').innerHTML=`<img src="${reader.result}" style="width:100%;height:100%;object-fit:contain">`;
    try{
      const r=await api('/api/admin/upload',{method:'POST',body:JSON.stringify({filename:file.name,data_base64:reader.result})});
      pfImageUrl=r.url; toast('Фото загружено');
    }catch(e){ toast('Не удалось загрузить фото'); }
  };
  reader.readAsDataURL(file);
}
async function submitProduct(){
  const id=document.getElementById('pf-id').value;
  const name=document.getElementById('pf-name').value.trim();
  const category=document.getElementById('pf-category').value.trim();
  const priceRaw=document.getElementById('pf-price').value;
  const inDefault=document.getElementById('pf-default-assortment').checked;
  if(!name){ toast('Введите название'); return; }
  const body={name,category,image_url:pfImageUrl,default_price:priceRaw===''?null:parseFloat(priceRaw),in_default_assortment:inDefault};
  try{
    if(id){ await api(`/api/admin/products/${id}`,{method:'POST',body:JSON.stringify(body)}); toast('Товар изменён'); }
    else{ await api('/api/admin/products',{method:'POST',body:JSON.stringify(body)}); toast('Товар добавлен'); }
    hideProductForm(); render();
  }catch(e){ toast('Ошибка сохранения'); }
}

// A6 Статистика
function viewStat(){
  const done = S.sessions.filter(s=>s.status==='dispensed');
  const rev = done.reduce((a,s)=>a+s.amount,0);
  const avg = done.length? rev/done.length : 0;
  const refunds = S.sessions.filter(s=>['refunded','refund_pending'].includes(s.status)).length;
  const refShare = S.sessions.length? (refunds/S.sessions.length*100):0;
  // часы пик
  const hours = new Array(24).fill(0);
  done.forEach(s=>{ const d=new Date(s.created_at+(s.created_at.endsWith('Z')?'':'Z')); hours[d.getHours()]++; });
  const maxH=Math.max(1,...hours);
  const bars = hours.map((v,i)=>`<div title="${i}:00 — ${v} прод." style="flex:1;height:${Math.max(3,Math.round(v/maxH*130))}px;border-radius:4px 4px 2px 2px;background:linear-gradient(180deg,#A03050,#8B253B)"></div>`).join('');
  // топ товаров
  const top={}; done.forEach(s=>{ top[s.product_name]=(top[s.product_name]||0)+s.amount; });
  const tops=Object.entries(top).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxT=Math.max(1,...tops.map(t=>t[1]));
  const topRows = tops.map(([n,v])=>`<div><div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700"><span>${esc(n)}</span><span style="color:var(--text2)">${fmt(v)}</span></div>
    <div style="height:9px;border-radius:999px;background:var(--bg);border:1px solid var(--line);margin-top:6px;overflow:hidden"><div style="height:100%;width:${Math.round(v/maxT*100)}%;background:linear-gradient(90deg,#A03050,#8B253B)"></div></div></div>`).join('') || `<div class="sub">Нет данных</div>`;
  return `<div style="display:flex;flex-direction:column;gap:16px;animation:fadeup .35s ease">
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <span class="sub">По всем сессиям (${S.sessions.length})</span><span style="flex:1"></span>
      <button class="btn-accent" style="background:linear-gradient(160deg,#3AA76A,#2E9E5B);box-shadow:0 8px 20px rgba(46,158,91,.35);padding:11px 17px;font-size:12.5px" onclick="exportCSV()">⇩ Excel</button>
      <button onclick="exportCSV()" style="font-size:12.5px;font-weight:800;color:var(--text);background:var(--surf);border:1.5px solid var(--line);border-radius:12px;padding:11px 17px;cursor:pointer">⇩ CSV</button></div>
    <div class="cards4">
      <div class="metric"><div class="lbl">Выручка (выдано)</div><div class="val" style="color:var(--accent2)">${fmt(rev)}</div></div>
      <div class="metric"><div class="lbl">Успешных продаж</div><div class="val">${done.length}</div></div>
      <div class="metric"><div class="lbl">Средний чек</div><div class="val">${fmt(avg)}</div></div>
      <div class="metric"><div class="lbl">Доля возвратов</div><div class="val">${refShare.toFixed(1).replace('.',',')}%</div></div></div>
    <div class="grid-dash">
      <div class="cardbox" style="border-radius:22px;padding:22px">
        <div style="font-size:16px;font-weight:800">Часы пик</div><div class="sub" style="margin-top:2px">продажи по часам</div>
        <div style="display:flex;align-items:flex-end;gap:3px;height:130px;margin-top:18px">${bars}</div>
        <div style="display:flex;justify-content:space-between;font-size:10.5px;font-weight:700;color:var(--text2);margin-top:6px"><span>00</span><span>06</span><span>12</span><span>18</span><span>23</span></div></div>
      <div class="cardbox" style="border-radius:22px;padding:22px">
        <div style="font-size:16px;font-weight:800;margin-bottom:14px">Топ товаров</div>
        <div style="display:flex;flex-direction:column;gap:12px">${topRows}</div></div>
    </div></div>`;
}
function exportCSV(){
  const head=['id','machine_id','slot_id','product','amount','status','phone','error','created_at'];
  const rows=S.sessions.map(s=>[s.id,s.machine_id,s.slot_id,s.product_name,s.amount,s.status,s.phone_number,s.error,s.created_at]
    .map(v=>`"${String(v==null?'':v).replace(/"/g,'""')}"`).join(','));
  const csv='﻿'+[head.join(','),...rows].join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='vending_sessions.csv'; a.click(); toast('Отчёт выгружен');
}

      <div class="sub" style="margin-bottom:10px">Роли: администратор — полный доступ; оператор — точки/слоты/сессии без настроек; наблюдатель — только просмотр</div>
      <div id="user-form" class="hidden" style="display:flex;gap:10px;flex-wrap:wrap;padding:12px;margin-bottom:10px;background:var(--bg);border-radius:12px;border:1px solid var(--line)">
        <input id="nu-username" class="fld" placeholder="Логин" style="width:160px;background:var(--surf)">
        <input id="nu-password" class="fld" type="password" placeholder="Пароль (мин. 6 симв.)" style="width:200px;background:var(--surf)">
        <select id="nu-role" class="fld" style="background:var(--surf);cursor:pointer">
          <option value="operator">Оператор</option><option value="viewer">Наблюдатель</option><option value="admin">Администратор</option>
        </select>
        <button class="btn-accent" style="padding:11px 20px" onclick="addUser()">Создать</button>
      </div>
      ${users}
    </div>

    <div class="cardbox" style="padding:20px 22px">
      <div style="font-size:15.5px;font-weight:800;margin-bottom:4px">Чёрный список номеров</div>
      <div class="sub" style="margin-bottom:10px">Заблокированные номера не смогут оплачивать покупки</div>
      ${bl}
      <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">
        <input id="bl-phone" class="fld" placeholder="+992 …" style="width:170px">
        <input id="bl-reason" class="fld" placeholder="Причина" style="flex:1;min-width:140px">
        <button class="btn-accent" style="background:linear-gradient(160deg,#D14343,#B93838);box-shadow:0 8px 20px rgba(209,67,67,.35);padding:11px 20px" onclick="addBlack()">Заблокировать</button>
      </div></div>

    <div class="cardbox" style="padding:20px 22px">
      <div style="font-size:15.5px;font-weight:800;margin-bottom:6px">Уведомления в Telegram</div>
      <div class="sub">Раздел в разработке: алерты о сбоях автомата, потере связи и нехватке товара.</div></div>
  </div>`;
}
function showAddUser(){ document.getElementById('user-form').classList.remove('hidden'); }
async function addUser(){
  const username=document.getElementById('nu-username').value.trim();
  const password=document.getElementById('nu-password').value;
  const role=document.getElementById('nu-role').value;
  if(!username || password.length<6){ toast('Логин и пароль от 6 символов'); return; }
  try{ await api('/api/admin/users',{method:'POST',body:JSON.stringify({username,password,role})});
    toast('Пользователь создан'); render(); }
  catch(e){ toast(e.message==='username already exists' ? 'Такой логин уже занят' : 'Ошибка создания'); }
}
async function removeUser(id, username){
  if(!confirm(`Удалить пользователя «${username}»?`)) return;
  try{ await api(`/api/admin/users/${id}`,{method:'DELETE'}); toast('Пользователь удалён'); render(); }
  catch(e){ toast('Не удалось удалить'); }
}
async function addBlack(){
  const phone_number=document.getElementById('bl-phone').value.trim();
  const reason=document.getElementById('bl-reason').value.trim();
  if(!phone_number){ toast('Введите номер'); return; }
  try{ await api('/api/admin/blacklist',{method:'POST',body:JSON.stringify({phone_number,reason})});
    toast('Номер заблокирован'); render(); }
  catch(e){ toast(e.message==='phone already blacklisted' ? 'Номер уже в списке' : 'Ошибка'); }
}
async function removeBlack(id, phone){
  if(!confirm(`Убрать «${phone}» из чёрного списка?`)) return;
  try{ await api(`/api/admin/blacklist/${id}`,{method:'DELETE'}); toast('Номер разблокирован'); render(); }
  catch(e){ toast('Не удалось удалить'); }
}
function setTheme(t){ document.documentElement.setAttribute('data-theme',t); localStorage.setItem('vq_theme',t); if(leafletMap) applyTiles(); render(); }

// ── Автовход, если сессия сохранена ──
if(TOKEN){
  (async()=>{ try{
    ME = await api('/api/admin/me');
    enterShell();
  }catch(e){ /* сессия истекла/невалидна — покажем логин */ } })();
}
</script>
</body>
</html>
